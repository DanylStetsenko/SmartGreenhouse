<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Greenhouse - Control Panel</title>
    <!-- Подключаем красивый современный шрифт -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        /* Цветовая палитра и переменные (стиль "чистый дашборд") */
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --accent-color: #10b981; /* Приятный зеленый */
            --accent-hover: #059669;
            --border-color: #e5e7eb;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            max-width: 900px;
            width: 100%;
        }

        header {
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            margin: 0 0 5px 0;
            font-size: 24px;
            font-weight: 600;
        }

        .subtitle {
            margin: 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Сетка для карточек */
        .pots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        /* Дизайн самой карточки */
        .pot-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border-color);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

            .pot-card:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08);
            }

        .plant-name {
            font-weight: 600;
            font-size: 18px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px dashed var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pot-stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .stat-label {
            color: var(--text-muted);
        }

        .stat-value {
            font-weight: 500;
            color: var(--text-main);
        }

        /* Кнопка полива */
        .btn-water {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

            .btn-water:hover {
                background-color: var(--accent-hover);
            }

        /* Статусы загрузки и ошибок */
        .status-msg {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            grid-column: 1 / -1;
            font-size: 15px;
        }

        .error-text {
            color: #ef4444;
            font-weight: 500;
        }

        .dose-input {
            width: 70px;
            padding: 6px 8px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }

            .dose-input:focus {
                border-color: var(--accent-color);
            }

        .btn-save-dose {
            background-color: var(--text-main);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

            .btn-save-dose:hover {
                opacity: 0.9;
            }
    </style>
</head>
<body>

    <div class="app-container">
        <header style="display: flex; justify-content: space-between; align-items: flex-start;">
            <div>
                <h1>🪴 Розумна Теплиця</h1>
                <div id="clockDisplay" style="margin-top: 5px; color: var(--text-muted); font-size: 14px; font-weight: 500; letter-spacing: 0.3px;">
                    Оновлення часу...
                </div>
            </div>

            <a href="debug.html" style="text-decoration: none; color: var(--text-muted); font-size: 12px; font-weight: 600; padding: 8px 14px; border: 1px solid var(--border-color); border-radius: 8px; transition: 0.2s; background: white;">
                🛠 ТЕСТУВАННЯ
            </a>
        </header>
        <div style="background: var(--card-bg); padding: 15px 20px; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div style="font-size: 24px;">⚙️</div>
                <div>
                    <div style="font-size: 14px; color: var(--text-muted); font-weight: 600; text-transform: uppercase;">Статус автоматики</div>
                    <div id="systemStatusBadge" style="font-size: 18px; font-weight: 700; color: #10b981;">✅ АКТИВНА</div>
                </div>
            </div>

            <button id="btnToggleSystem" onclick="toggleSystem()" style="background: #ef4444; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px;">
                🛑 Вимкнути систему
            </button>
        </div>
        <main>
            <div style="background: var(--card-bg); border-radius: 12px; padding: 20px; margin-bottom: 25px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid var(--border-color); display: flex; justify-content: space-around; align-items: center; flex-wrap: wrap; gap: 15px;">
                <div style="text-align: center; flex: 1;">
                    <div style="font-size: 28px; margin-bottom: 5px;">🌡️</div>
                    <div style="color: var(--text-muted); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Температура</div>
                    <div id="airTempDisplay" style="font-size: 22px; font-weight: 700; color: var(--text-main); margin-top: 4px;">-- °C</div>
                </div>

                <div style="width: 1px; height: 50px; background: var(--border-color); display: block;"></div>

                <div style="text-align: center; flex: 1;">
                    <div style="font-size: 28px; margin-bottom: 5px;">🌫️</div>
                    <div style="color: var(--text-muted); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Вологість повітря</div>
                    <div id="airHumDisplay" style="font-size: 22px; font-weight: 700; color: var(--text-main); margin-top: 4px;">-- %</div>
                </div>

                <div style="width: 1px; height: 50px; background: var(--border-color); display: block;"></div>

                <div style="text-align: center; flex: 1;">
                    <div style="font-size: 28px; margin-bottom: 5px;">☀️</div>
                    <div style="color: var(--text-muted); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Освітленість (УФ)</div>
                    <div id="lightDisplay" style="font-size: 22px; font-weight: 700; color: var(--text-main); margin-top: 4px;">--</div>
                </div>
            </div>

            <div class="pots-grid" id="potsContainer">
                <div class="status-msg">
                    ⏳ Завантаження конфігурації з бази даних...
                </div>
            </div>
        </main>
    </div>

    <!-- Модальне вікно для додавання горщика -->
    <div id="modalOverlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 50;">
        <div style="background: white; padding: 25px; border-radius: 12px; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
            <h3 style="margin-top: 0; color: #1f2937;">➕ Новий горщик</h3>

            <p style="font-size: 14px; color: #6b7280; margin-bottom: 5px; font-weight: 500;">Оберіть рослину з бази:</p>
            <select id="newPlantSelect" style="width: 100%; padding: 10px; margin-bottom: 25px; border-radius: 6px; border: 1px solid #d1d5db; outline: none;"></select>

            <div style="display: flex; gap: 10px;">
                <button onclick="saveNewPot()" style="flex: 1; background: #10b981; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: 600; cursor: pointer;">Додати</button>
                <button onclick="closeModal()" style="flex: 1; background: #ef4444; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: 600; cursor: pointer;">Скасувати</button>
            </div>
        </div>
    </div>

    <script>
        async function loadPotsFromDatabase() {
            try {
                const response = await fetch('/api/pots');
                if (!response.ok) throw new Error('Network response was not ok');

                const pots = await response.json();
                const container = document.getElementById('potsContainer');
                container.innerHTML = '';

                if (pots.length === 0) {
                    container.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 20px; color: #6b7280; font-size: 16px;">У базі даних поки немає активних горщиків. Додайте перший! 👇</div>';
                } else {
                    pots.forEach((pot, index) => {
                        const visualNumber = index + 1;

                        const cardHtml = `
                            <div class="pot-card" style="position: relative;">
                                <button onclick="deletePot(${pot.id})" title="Видалити горщик" style="position: absolute; top: 12px; right: 12px; background: none; border: none; font-size: 16px; cursor: pointer; color: #ef4444; padding: 4px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.2s;">
                                    ✖
                                </button>
                                <div class="plant-name">🌱 ${pot.plantName}</div>
                                <div class="pot-stat">
                                    <span class="stat-label">Номер горщика:</span>
                                    <span class="stat-value">#${visualNumber}</span>
                                </div>
                                <div class="pot-stat">
                                    <span class="stat-label">Апаратний слот:</span>
                                    <span class="stat-value">GPIO ${pot.relayPin}</span>
                                </div>
                                <div class="pot-stat">
                                    <span class="stat-label">Вологість ґрунту:</span>
                                    <span class="stat-value" id="soil${pot.id}Value">Очікування...</span>
                                </div>

                                <!-- Новий блок для налаштування дози поливу -->
                                <div class="pot-stat" style="margin-top: 15px; padding-top: 15px; border-top: 1px dashed var(--border-color);">
                                    <span class="stat-label">Доза поливу (мс):</span>
                                    <div style="display: flex; gap: 6px;">
                                        <input type="number" id="doseInput${pot.id}" class="dose-input" value="${pot.wateringDoseMs}" min="100" max="60000" step="100">
                                        <button class="btn-save-dose" id="btnSaveDose${pot.id}" onclick="savePotDose(${pot.id})">OK</button>
                                    </div>
                                </div>

                                <button class="btn-water" id="btnWater${pot.id}" onclick="waterPot(${pot.id})">
                                    💦 Полити (Авто-доза)
                                </button>
                            </div>
                        `;
                        container.insertAdjacentHTML('beforeend', cardHtml);
                    });
                }

                const addCardHtml = `
                    <div class="pot-card" onclick="openModal()" style="display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; min-height: 220px; border: 2px dashed #10b981; background: #f0fdf4; box-shadow: none;">
                        <div style="font-size: 48px; color: #10b981; line-height: 1;">+</div>
                        <div style="color: #10b981; font-weight: 600; margin-top: 10px;">Додати горщик</div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', addCardHtml);

            } catch (error) {
                document.getElementById('potsContainer').innerHTML = `
                    <div class="status-msg error-text" style="grid-column: 1 / -1; text-align: center;">❌ Помилка з'єднання з базою даних.</div>
                `;
            }
        }

        function updateClock() {
            const now = new Date();
            const options = {
                weekday: 'long',
                day: 'numeric',
                month: 'long',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            };
            let formatted = now.toLocaleString('uk-UA', options);
            formatted = formatted.charAt(0).toUpperCase() + formatted.slice(1);
            const clockEl = document.getElementById('clockDisplay');
            if (clockEl) {
                clockEl.innerText = formatted;
            }
        }

        setInterval(updateClock, 1000);
        updateClock();

        async function waterPot(potId) {
            const btn = document.getElementById(`btnWater${potId}`);
            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳ Поливаємо...';
            btn.disabled = true;

            try {
                const response = await fetch(`/api/water/${potId}`, { method: 'POST' });
                btn.innerHTML = response.ok ? '✅ Успішно' : '❌ Помилка на сервері';
            } catch (error) {
                btn.innerHTML = '❌ Збій мережі';
            }

            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }, 2000);
        }

        async function deletePot(potId) {
            if (!confirm('Ви впевнені, що хочете видалити цей горщик?')) {
                return;
            }

            try {
                const response = await fetch(`/api/pots/${potId}`, { method: 'DELETE' });

                if (response.ok) {
                    loadPotsFromDatabase();
                } else {
                    alert('❌ Помилка при видаленні на сервері');
                }
            } catch (error) {
                alert('❌ Збій мережі');
            }
        }

        // --- НОВА ФУНКЦІЯ: Збереження дози поливу ---
        async function savePotDose(potId) {
            const input = document.getElementById(`doseInput${potId}`);
            const btn = document.getElementById(`btnSaveDose${potId}`);
            const newDoseMs = parseInt(input.value);

            if (isNaN(newDoseMs) || newDoseMs < 100 || newDoseMs > 60000) {
                alert("Введіть коректне значення від 100 до 60000 мс");
                return;
            }

            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳';
            btn.disabled = true;

            try {
                const response = await fetch(`/api/pots/${potId}/dose`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ doseMs: newDoseMs })
                });

                if (response.ok) {
                    btn.innerHTML = '✅';
                    btn.style.backgroundColor = '#10b981'; // Зелений при успіху
                } else {
                    const err = await response.text();
                    alert("Помилка сервера: " + err);
                    btn.innerHTML = '❌';
                    btn.style.backgroundColor = '#ef4444';
                }
            } catch (error) {
                alert("Помилка з'єднання");
                btn.innerHTML = '❌';
                btn.style.backgroundColor = '#ef4444';
            }

            // Повертаємо кнопку до початкового стану через 2 секунди
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.backgroundColor = 'var(--text-main)';
                btn.disabled = false;
            }, 2000);
        }

        async function testWaterPump() {
            try {
                const response = await fetch('/api/water/test', { method: 'POST' });
                if (response.ok) {
                    alert('✅ Сигнал надіслано! Насос має включитися на 1 секунду.');
                } else {
                    alert('❌ Сервер відхилив запит (Помилка ' + response.status + ')');
                }
            } catch (e) {
                alert('❌ Немає зв\'язку з сервером: ' + e.message);
            }
        }

        async function fetchSensors() {
            try {
                const response = await fetch('/api/sensors');
                if (!response.ok) return;

                const data = await response.json();

                if (data.isSystemActive !== undefined) {
                    isSystemActive = data.isSystemActive;
                    const btn = document.getElementById('btnToggleSystem');
                    const badge = document.getElementById('systemStatusBadge');

                    if (isSystemActive) {
                        btn.innerHTML = '🛑 Вимкнути систему';
                        btn.style.background = '#ef4444';
                        badge.innerHTML = '✅ АКТИВНА';
                        badge.style.color = '#10b981';
                    } else {
                        btn.innerHTML = '▶️ Увімкнути систему';
                        btn.style.background = '#10b981';
                        badge.innerHTML = '⏸ НА ПАУЗІ';
                        badge.style.color = '#ef4444';
                    }
                }

                const rawPanel = document.getElementById('rawSensorsText');
                if (rawPanel) {
                    rawPanel.innerText = JSON.stringify(data);
                }

                if (data.airTemp !== undefined) document.getElementById('airTempDisplay').innerText = data.airTemp + ' °C';
                if (data.airHum !== undefined) document.getElementById('airHumDisplay').innerText = data.airHum + ' %';
                if (data.uvLight !== undefined) document.getElementById('lightDisplay').innerText = data.uvLight;

                const potsData = data.pots ? data.pots : data;

                for (const [id, value] of Object.entries(potsData)) {
                    if (id === 'remote' || id === 'airTemp' || id === 'airHum' || id === 'uvLight') continue;

                    const el = document.getElementById(`soil${id}Value`);
                    if (el) el.innerText = value + ' %';
                }
            } catch (error) {
                console.error("Не вдалося оновити сенсори", error);
            }
        }

        let isSystemActive = true;

        async function toggleSystem() {
            const newState = !isSystemActive;

            if (!newState && !confirm("Ви впевнені, що хочете вимкнути всю автоматику? Рослини не будуть поливатися!")) {
                return;
            }

            try {
                await fetch('/api/system/toggle', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ isActive: newState })
                });
            } catch (e) {
                alert("Помилка з'єднання");
            }
        }

        async function openModal() {
            document.getElementById('modalOverlay').style.display = 'flex';
            try {
                const response = await fetch('/api/plants');
                const plants = await response.json();

                const select = document.getElementById('newPlantSelect');
                select.innerHTML = '';

                plants.forEach(p => {
                    select.innerHTML += `<option value="${p.id}">${p.name}</option>`;
                });
            } catch (e) {
                alert("Не вдалося завантажити список рослин");
            }
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        async function saveNewPot() {
            const plantId = document.getElementById('newPlantSelect').value;

            try {
                const response = await fetch('/api/pots', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ plantProfileId: parseInt(plantId) })
                });

                if (response.ok) {
                    closeModal();
                    loadPotsFromDatabase();
                } else {
                    const errorText = await response.text();
                    alert("Помилка: " + errorText);
                }
            } catch (e) {
                alert("Помилка мережі");
            }
        }

        window.onload = loadPotsFromDatabase;
        setInterval(fetchSensors, 2000);
    </script>
</body>
</html>
