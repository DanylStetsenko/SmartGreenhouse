<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Greenhouse - Control Panel</title>
    <!-- Подключаем красивый современный шрифт -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        /* Цветовая палитра и переменные (стиль "чистый дашборд") */
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --accent-color: #10b981; /* Приятный зеленый */
            --accent-hover: #059669;
            --border-color: #e5e7eb;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            max-width: 900px;
            width: 100%;
        }

        header {
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            margin: 0 0 5px 0;
            font-size: 24px;
            font-weight: 600;
        }

        .subtitle {
            margin: 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Сетка для карточек */
        .pots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        /* Дизайн самой карточки */
        .pot-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border-color);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

            .pot-card:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08);
            }

        .plant-name {
            font-weight: 600;
            font-size: 18px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px dashed var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pot-stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .stat-label {
            color: var(--text-muted);
        }

        .stat-value {
            font-weight: 500;
            color: var(--text-main);
        }

        /* Кнопка полива */
        .btn-water {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

            .btn-water:hover {
                background-color: var(--accent-hover);
            }

        /* Статусы загрузки и ошибок */
        .status-msg {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            grid-column: 1 / -1;
            font-size: 15px;
        }

        .error-text {
            color: #ef4444;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>🪴 Розумна Теплиця</h1>
            <p class="subtitle">Панель керування v0.9 (Pre-prod)</p>
        </header>

        <main>
            <!-- ДЕБАГ ПАНЕЛЬ -->
            <div style="background: #e2e8f0; padding: 15px; border-radius: 8px; margin-bottom: 25px; border: 2px dashed #94a3b8;">
                <h3 style="margin-top: 0; color: #334155;">🛠 Прямий доступ (Дебаг)</h3>

                <p style="margin-bottom: 15px; color: #475569;">
                    <strong>Сирі дані з сенсорів:</strong>
                    <code id="rawSensorsText" style="background: #fff; padding: 4px 8px; border-radius: 4px;">Очікування...</code>
                </p>

                <button onclick="testWaterPump()" style="background: #3b82f6; color: white; padding: 10px 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;">
                    💦 Примусовий запуск насоса (Пін 17)
                </button>
            </div>
            <!-- КОНЕЦ ДЕБАГ ПАНЕЛИ -->
            <!-- Контейнер, куда скрипт будет вставлять карточки -->
            <div class="pots-grid" id="potsContainer">
                <div class="status-msg">
                    ⏳ Завантаження конфігурації з бази даних...
                </div>
            </div>
        </main>
    </div>
    <!-- Модальне вікно для додавання горщика -->
    <div id="modalOverlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 50;">
        <div style="background: white; padding: 25px; border-radius: 12px; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
            <h3 style="margin-top: 0; color: #1f2937;">➕ Новий горщик</h3>

            <p style="font-size: 14px; color: #6b7280; margin-bottom: 5px; font-weight: 500;">Оберіть рослину з бази:</p>
            <select id="newPlantSelect" style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #d1d5db; outline: none;"></select>

            <p style="font-size: 14px; color: #6b7280; margin-bottom: 5px; font-weight: 500;">GPIO пін насоса (реле):</p>
            <input type="number" id="newRelayPin" placeholder="Наприклад: 23" style="width: 100%; padding: 10px; margin-bottom: 25px; border-radius: 6px; border: 1px solid #d1d5db; box-sizing: border-box; outline: none;">

            <div style="display: flex; gap: 10px;">
                <button onclick="saveNewPot()" style="flex: 1; background: #10b981; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: 600; cursor: pointer;">Додати</button>
                <button onclick="closeModal()" style="flex: 1; background: #ef4444; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: 600; cursor: pointer;">Скасувати</button>
            </div>
        </div>
    </div>
    <script>
        // 1. Загрузка карточек из базы
        async function loadPotsFromDatabase() {
            try {
                const response = await fetch('/api/pots');
                if (!response.ok) throw new Error('Network response was not ok');

                const pots = await response.json();
                const container = document.getElementById('potsContainer');
                container.innerHTML = '';

                if (pots.length === 0) {
                    container.innerHTML = '<div class="status-msg">У базі даних поки немає активних горщиків.</div>';
                    return;
                }

                pots.forEach(pot => {
                    const cardHtml = `
                            <div class="pot-card">
                                <div class="plant-name">🌱 ${pot.plantName}</div>
                                <div class="pot-stat">
                                    <span class="stat-label">Номер горщика:</span>
                                    <span class="stat-value">#${pot.id}</span>
                                </div>
                                <div class="pot-stat">
                                    <span class="stat-label">Апаратний пін:</span>
                                    <span class="stat-value">GPIO ${pot.relayPin}</span>
                                </div>
                                <div class="pot-stat">
                                    <span class="stat-label">Вологість ґрунту:</span>
                                    <span class="stat-value" id="soil${pot.id}Value">Очікування...</span>
                                </div>
                                <button class="btn-water" id="btnWater${pot.id}" onclick="waterPot(${pot.id})">
                                    💦 Полити (Авто-доза)
                                </button>
                            </div>
                        `;
                    container.insertAdjacentHTML('beforeend', cardHtml);
                });
                const addCardHtml = `
            <div class="pot-card" onclick="openModal()" style="display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; min-height: 220px; border: 2px dashed #10b981; background: #f0fdf4; box-shadow: none;">
                <div style="font-size: 48px; color: #10b981; line-height: 1;">+</div>
                <div style="color: #10b981; font-weight: 600; margin-top: 10px;">Додати горщик</div>
            </div>
`;
                container.insertAdjacentHTML('beforeend', addCardHtml);
            } catch (error) {
                document.getElementById('potsContainer').innerHTML = `
                        <div class="status-msg error-text">❌ Помилка з'єднання з базою даних.</div>
                    `;
            }
        }

        // 2. Полив через базу (по ID)
        async function waterPot(potId) {
            const btn = document.getElementById(`btnWater${potId}`);
            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳ Поливаємо...';
            btn.disabled = true;

            try {
                const response = await fetch(`/api/water/${potId}`, { method: 'POST' });
                btn.innerHTML = response.ok ? '✅ Успішно' : '❌ Помилка на сервері';
            } catch (error) {
                btn.innerHTML = '❌ Збій мережі';
            }

            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }, 2000);
        }

        // 3. ДЕБАГ: Принудительный полив в обход базы
        async function testWaterPump() {
            try {
                const response = await fetch('/api/water/test', { method: 'POST' });
                if (response.ok) {
                    alert('✅ Сигнал надіслано! Насос має включитися на 1 секунду.');
                } else {
                    alert('❌ Сервер відхилив запит (Помилка ' + response.status + ')');
                }
            } catch (e) {
                alert('❌ Немає зв\'язку з сервером: ' + e.message);
            }
        }

        // 4. ДЕБАГ + ОБНОВЛЕНИЕ: Опрос датчиков
        async function fetchSensors() {
            try {
                const response = await fetch('/api/sensors');
                if (!response.ok) return;

                const data = await response.json();

                // Выводим сырой JSON в нашу новую панель
                const rawPanel = document.getElementById('rawSensorsText');
                if (rawPanel) {
                    rawPanel.innerText = JSON.stringify(data);
                }

                // Заодно обновляем красивые карточки, если они загрузились
                for (const [id, value] of Object.entries(data)) {
                    const el = document.getElementById(`soil${id}Value`);
                    if (el) el.innerText = value;
                }
            } catch (error) {
                console.error("Не вдалося оновити сенсори", error);
            }
        }
        async function openModal() {
            document.getElementById('modalOverlay').style.display = 'flex';
            document.getElementById('newRelayPin').value = ''; // Очищаем старый ввод

            try {
                // Загружаем список растений из базы
                const response = await fetch('/api/plants');
                const plants = await response.json();

                const select = document.getElementById('newPlantSelect');
                select.innerHTML = ''; // Очищаем старые опции

                plants.forEach(p => {
                    select.innerHTML += `<option value="${p.id}">${p.name}</option>`;
                });
            } catch (e) {
                alert("Не вдалося завантажити список рослин");
            }
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        async function saveNewPot() {
            const plantId = document.getElementById('newPlantSelect').value;
            const pin = document.getElementById('newRelayPin').value;

            if (!pin) {
                alert("Будь ласка, вкажіть GPIO пін!");
                return;
            }

            try {
                // Отправляем данные на наш новый эндпоинт
                const response = await fetch('/api/pots', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        plantProfileId: parseInt(plantId),
                        relayPin: parseInt(pin)
                    })
                });

                if (response.ok) {
                    closeModal();
                    loadPotsFromDatabase(); // Перезагружаем интерфейс, чтобы увидеть новый горшок!
                } else {
                    alert("Помилка при збереженні на сервері");
                }
            } catch (e) {
                alert("Помилка мережі");
            }
        }
        // Запускаем загрузку карточек при старте
        window.onload = loadPotsFromDatabase;

        // Запускаем опрос датчиков каждые 2 секунды
        setInterval(fetchSensors, 2000);
    </script>

</body>
</html>
