<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Smart Greenhouse</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .sensor-panel {
            margin-top: 20px;
            padding: 15px;
            border: 2px solid #4CAF50;
            border-radius: 8px;
            width: 300px;
            background-color: #f9f9f9;
        }

        .val {
            font-weight: bold;
            color: #d35400;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <h1>Привіт, я рослина</h1>
    <p>Тут далі.</p>

    <div class="sensor-panel">
        <h3>Поточні показники:</h3>
        <p>Вологість ґрунту 1 (A0): <span id="soil1Value" class="val">Завантаження...</span></p>
        <p>Вологість ґрунту 2 (A2): <span id="soil2Value" class="val">Завантаження...</span></p>
        <p>Вологість ґрунту 3 (A3): <span id="soil3Value" class="val">Завантаження...</span></p>
        <p>УФ індекс (A1): <span id="uvValue" class="val">Завантаження...</span></p>
        <hr>
        <p>Статус пульта: <span id="remoteValue" class="val" style="color: #2980b9;">Очікування...</span></p>
        <hr>
        <button id="waterBtn" onclick="startWatering()" style="padding: 10px 15px; background-color: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%;">
            💦 Полити всі горщики (1 сек)
        </button>
    </div>
    <div class="pots-grid" id="potsContainer">
        <div style="text-align: center; width: 100%;">⏳ Завантаження горщиків...</div>
    </div>

    <script>
        async function loadPotsFromDatabase() {
            try {
                const response = await fetch('/api/pots');
                const pots = await response.json();

                const container = document.getElementById('potsContainer');
                container.innerHTML = ''; // Очищаем надпись "Загрузка"

                // Проходимся циклом по каждому горшку из базы
                pots.forEach(pot => {
                    // Создаем HTML-код для одной карточки
                    const cardHtml = `
                <div class="pot-card">
                    <input type="text" class="plant-name-input" value="${pot.plantName}" readonly>
                    <div class="pot-stat">
                        <span>Горщик #${pot.id} (Пін ${pot.relayPin}):</span>
                        <span class="pot-val" id="soil${pot.id}Value">--</span>
                    </div>
                    <!-- Обрати внимание: кнопка сразу передает правильный ID горшка -->
                    <button class="btn-water" id="btnWater${pot.id}" onclick="waterPot(${pot.id})">
                        💦 Полити (Авто-доза)
                    </button>
                </div>
            `;
                    // Вставляем карточку на страницу
                    container.insertAdjacentHTML('beforeend', cardHtml);
                });

            } catch (error) {
                console.error("Помилка завантаження бази даних:", error);
                document.getElementById('potsContainer').innerHTML = '❌ Помилка з\'єднання з базою';
            }
        }

        // Запускаем эту функцию сразу при открытии страницы
        window.onload = loadPotsFromDatabase;
        async function fetchSensorData() {
            try {
                const response = await fetch('/api/hardware/sensors');
                if (response.ok) {
                    const data = await response.json();

                    // ОБНОВЛЕНО: Читаем 3 почвы
                    document.getElementById('soil1Value').innerText = data.soil1;
                    document.getElementById('soil2Value').innerText = data.soil2;
                    document.getElementById('soil3Value').innerText = data.soil3;
                    document.getElementById('uvValue').innerText = data.uv;
                    document.getElementById('remoteValue').innerText = data.remote;
                }
            } catch (error) {
                console.error('Ошибка связи:', error);
            }
        }

        // НОВАЯ ФУНКЦИЯ ДЛЯ КНОПКИ
        async function startWatering() {
            const btn = document.getElementById('waterBtn');
            btn.disabled = true; // Блокируем кнопку от двойного нажатия
            btn.innerText = "⏳ Поливаю...";
            btn.style.backgroundColor = "#95a5a6";

            try {
                // Отправляем POST запрос на наш новый контроллер
                await fetch('/api/hardware/water', { method: 'POST' });
            } catch (error) {
                alert('Помилка з\'єднання з теплицею!');
            } finally {
                // Возвращаем кнопку в нормальное состояние
                btn.disabled = false;
                btn.innerText = "💦 Полити всі горщики (1 сек)";
                btn.style.backgroundColor = "#3498db";
            }
        }

        fetchSensorData();
        setInterval(fetchSensorData, 2000);
    </script>
</body>
</html>
